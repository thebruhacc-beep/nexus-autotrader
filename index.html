<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Sniper Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <div class="logo">NEXUS<span>PRO</span></div>
            <div id="wallet-container">
                <button id="connect-btn" class="phantom-btn">
                    <img src="https://phantom.app/favicon.ico" alt="P">
                    <span>Connect Phantom</span>
                </button>
            </div>
        </header>

        <section class="dashboard-stats">
            <div class="stat-box">
                <label>Winrate</label>
                <div id="winrate" class="value">--%</div>
                <div class="progress-bar"><div id="winrate-fill" style="width: 0%"></div></div>
            </div>
            <div class="stat-box">
                <label>Total PnL</label>
                <div id="total-pnl" class="value text-success">0.0000 SOL</div>
            </div>
            <div class="stat-box">
                <label>Open Trades</label>
                <div id="open-positions" class="value">0</div>
            </div>
            <div class="stat-box">
                <label>Wallet Balans</label>
                <div id="balance" class="value">0.00 SOL</div>
            </div>
        </section>

        <div class="main-layout">
            <aside class="settings">
                <h3>Robot Instellingen</h3>
                <div class="field">
                    <label>Trade Size (SOL)</label>
                    <input type="number" id="trade-size" value="0.002" min="0.001" step="0.001">
                    <small>Challenge: 0.01 SOL (5 trades)</small>
                </div>
                <div class="field">
                    <label>Min. Winrate Filter</label>
                    <input type="range" id="min-win" min="50" max="95" value="80">
                    <span id="win-val">80%</span>
                </div>
                <button id="start-btn" class="btn-glow">START AUTO-TRADER</button>
            </aside>

            <section class="terminal">
                <div class="terminal-header">
                    <span class="pulse"></span> LIVE SCANNER & EXECUTION
                </div>
                <div id="log-container" class="log-area"></div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
