<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Sniper Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">NEXUS<span>PRO</span></div>
            <!-- KNOP ZONDER IMG TAG - GEEN BROKEN PHOTOS MEER -->
            <button id="connect-btn" class="phantom-btn">
                <svg width="20" height="20" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="40" fill="white" opacity="0.8"/>
                </svg>
                <span id="btn-text">Connect Phantom</span>
            </button>
        </header>

        <section class="dashboard">
            <div class="stat-card"><span>Total PnL</span><h3 id="pnl">0.0000 SOL</h3></div>
            <div class="stat-card"><span>Winrate</span><h3 id="winrate">--%</h3></div>
            <div class="stat-card"><span>Wallet Balans</span><h3 id="balance">0.00 SOL</h3></div>
        </section>

        <div class="main-grid">
            <aside class="controls">
                <h3>Robot Settings</h3>
                <div class="input-field">
                    <label>Trade Size (SOL)</label>
                    <input type="number" id="trade-size" value="0.002" step="0.001">
                </div>
                <div class="input-field">
                    <label>Min. Winrate Filter</label>
                    <input type="number" id="min-winrate" value="85">
                </div>
                <div class="input-field">
                    <label>Network Fees</label>
                    <div class="auto-fee-badge">DYNAMIC AUTO-FEE ON</div>
                </div>
                <button id="start-btn" class="glow-button">START AUTO-TRADER</button>
            </aside>

            <section class="terminal">
                <div class="terminal-nav">
                    <span>LIVE ACTIVITY SCANNER</span>
                    <span id="open-positions">Open Positions: 0</span>
                </div>
                <div id="log-container" class="log-area">
                    <div class="log-entry system">> Systeem klaar. Klik op Connect Phantom...</div>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
