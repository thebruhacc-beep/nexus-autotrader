<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Sniper Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="brand">NEXUS<span>PRO</span></div>
            <button id="connect-btn" class="connect-wallet-btn">
                <svg width="20" height="20" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="40" fill="white"/>
                </svg>
                <span id="btn-text">Connect Phantom</span>
            </button>
        </header>

        <section class="stats-overview">
            <div class="stat-item">
                <span class="label">Total PnL</span>
                <div id="pnl" class="value">0.0000 SOL</div>
            </div>
            <div class="stat-item">
                <span class="label">Winrate</span>
                <div id="winrate" class="value">--%</div>
            </div>
            <div class="stat-item">
                <span class="label">Wallet Balans</span>
                <div id="balance" class="value">0.00 SOL</div>
            </div>
        </section>

        <div class="dashboard-content">
            <aside class="sidebar-settings">
                <h3>Robot Config</h3>
                <div class="input-box">
                    <label>Trade Size (SOL)</label>
                    <input type="number" id="trade-size" value="0.002" step="0.001">
                </div>
                <div class="input-box">
                    <label>Min. Winrate Filter</label>
                    <input type="number" id="min-winrate" value="85">
                </div>
                <div class="fee-info">
                    <span class="fee-dot"></span> DYNAMIC AUTO-FEE ACTIVE
                </div>
                <button id="start-bot-btn" class="action-btn">START AUTO-TRADER</button>
            </aside>

            <section class="terminal-window">
                <div class="terminal-top">
                    <span>LIVE SCANNER FEED</span>
                    <span id="pos-count">Positions: 0</span>
                </div>
                <div id="log-display" class="log-content">
                    <div class="log-line system">> Systeem standby. Wachten op wallet...</div>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
