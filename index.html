<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Auto-Sniper | 0.01 SOL Challenge</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">NEXUS<span>AUTOBOT</span></div>
            <div class="header-actions">
                <button id="connect-btn" class="btn-secondary">Connect Phantom</button>
                <div id="wallet-info" class="hidden"></div>
            </div>
        </header>

        <section class="stats-bar">
            <div class="stat"><span>Winrate</span><h3 id="winrate">0%</h3></div>
            <div class="stat"><span>Total PnL</span><h3 id="total-pnl">0.00 SOL</h3></div>
            <div class="stat"><span>Open Pos.</span><h3 id="open-positions">0</h3></div>
            <div class="stat"><span>Balans</span><h3 id="balance">0.00 SOL</h3></div>
        </section>

        <main class="grid">
            <section class="settings-box">
                <h3>Instellingen</h3>
                <div class="input-group">
                    <label>Trade Size (SOL)</label>
                    <input type="number" id="trade-size" value="0.002" step="0.001">
                </div>
                <div class="input-group">
                    <label>Max Open Positions</label>
                    <input type="number" id="max-pos" value="3">
                </div>
                <div class="input-group">
                    <label>Slippage (%)</label>
                    <input type="number" id="slippage" value="1">
                </div>
                <div class="input-group">
                    <label>Min. Winrate Filter (%)</label>
                    <input type="number" id="min-win" value="75">
                </div>
                <button id="start-btn" class="btn-start">START AUTO-TRADER</button>
            </section>

            <section class="monitor-box">
                <div class="monitor-header">
                    <h3>Live Scanner</h3>
                    <span id="bot-status">Status: Standby</span>
                </div>
                <div id="log-container" class="logs">
                    <p class="system-msg">> Systeem klaar. Verbind Phantom om te beginnen.</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
