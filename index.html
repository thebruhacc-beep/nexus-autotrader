<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Sniper Pro | 0.01 Challenge</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">NEXUS<span>SNIPER</span></div>
            <!-- De verbeterde Phantom knop met inline SVG logo -->
            <button id="connect-btn" class="phantom-btn">
                <svg width="20" height="20" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
                    <path d="M64 128c35.346 0 64-28.654 64-64S99.346 0 64 0 0 28.654 0 64s28.654 64 64 64z" fill="#AB9FF2"/>
                    <path d="M84.72 41.56c-1.32-3.12-4.44-5.28-7.92-5.28H51.2c-3.48 0-6.6 2.16-7.92 5.28L32 67.44v21.12c0 4.44 3.6 8.04 8.04 8.04h47.92c4.44 0 8.04-3.6 8.04-8.04V67.44l-11.28-25.88z" fill="#fff"/>
                    <circle cx="48.4" cy="62.56" r="5.52" fill="#000"/>
                    <circle cx="79.6" cy="62.56" r="5.52" fill="#000"/>
                </svg>
                <span id="btn-text">Connect Phantom</span>
            </button>
        </header>

        <section class="dashboard">
            <div class="stat-card"><span>Total PnL</span><h3 id="pnl">0.0000 SOL</h3></div>
            <div class="stat-card"><span>Winrate</span><h3 id="winrate">--%</h3></div>
            <div class="stat-card"><span>Balans</span><h3 id="balance">0.0000 SOL</h3></div>
        </section>

        <div class="main-grid">
            <aside class="controls">
                <h3>Robot Settings</h3>
                <div class="input-field">
                    <label>Trade Size (SOL)</label>
                    <input type="number" id="trade-size" value="0.002" step="0.001">
                </div>
                <div class="input-field">
                    <label>Min. Winrate Filter (%)</label>
                    <input type="number" id="min-winrate" value="85">
                </div>
                <div class="input-field">
                    <label>Fees</label>
                    <div class="auto-fee-badge">AUTO-OPTIMIZE ON</div>
                </div>
                <button id="start-btn" class="glow-button">START AUTO-TRADER</button>
            </aside>

            <section class="terminal">
                <div class="terminal-nav">
                    <span>LIVE SCANNER</span>
                    <span id="open-positions">Open Positions: 0</span>
                </div>
                <div id="log-container" class="log-area">
                    <div class="log-entry system">> Systeem standby. Koppel Phantom om de 0.01 SOL challenge te starten...</div>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
