<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS ALPHA | Solana Signal Scanner</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        :root { --bg: #030303; --accent: #00f2ff; --card: #0d0d0d; --success: #00ff88; --danger: #ff3e3e; --warning: #f1c40f; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'JetBrains Mono', monospace; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; padding-bottom: 20px; margin-bottom: 20px; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        /* Scanner Layout */
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        
        .signal-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; transition: 0.3s; }
        .signal-card:hover { border-color: var(--accent); }
        .signal-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge-safe { background: rgba(0, 255, 136, 0.1); color: var(--success); border: 1px solid var(--success); }
        
        .token-info h2 { margin: 0; font-size: 20px; color: white; }
        .token-info p { margin: 5px 0; font-size: 12px; color: #888; }
        
        .ca-box { background: #000; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; margin: 15px 0; border: 1px solid #222; }
        .ca-text { font-size: 11px; color: var(--accent); overflow: hidden; text-overflow: ellipsis; }
        .copy-btn { background: var(--accent); color: #000; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }
        
        .safety-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 10px; }
        .check-item { display: flex; align-items: center; gap: 5px; }
        .check-icon { font-size: 12px; }

        .terminal-box { background: #000; border: 1px solid #1a1a1a; border-radius: 12px; height: 600px; display: flex; flex-direction: column; }
        .terminal-header { background: #0d0d0d; padding: 10px 15px; font-size: 11px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; }
        .logs { flex: 1; overflow-y: auto; padding: 15px; font-size: 12px; line-height: 1.6; }
        .log-entry { margin-bottom: 8px; border-left: 2px solid #222; padding-left: 10px; }

        .status-dot { height: 8px; width: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px var(--success); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">NEXUS<span>ALPHA</span> PRO</div>
            <div id="connection-status"><span class="status-dot"></span> SCANNER ACTIVE</div>
        </header>

        <div class="grid">
            <aside id="signal-list">
                <div style="font-size: 12px; color: #555; margin-bottom: 10px;">RECENT HIGH-CONFIDENCE SIGNALS</div>
                <!-- Signals verschijnen hier -->
            </aside>

            <main class="terminal-box">
                <div class="terminal-header">
                    <span>SOLANA MAINNET-BETA LIVE FEED</span>
                    <span id="block-height">BLOCK: 274,841,202</span>
                </div>
                <div id="log-box" class="logs">
                    <div class="log-entry" style="color: var(--accent)">[SYSTEM] Initializing Alpha Scanner v2.0.4...</div>
                    <div class="log-entry">[SYSTEM] Connecting to Solana RPC...</div>
                    <div class="log-entry" style="color: var(--success)">[SYSTEM] Connection Established. Monitoring Raydium Authority...</div>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
